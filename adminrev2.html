<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MakanYuk! — Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
/* ===== RESET & BASE ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --red: #E8341A;
  --red2: #FF5535;
  --orange: #FF8C00;
  --green: #2ECC71;
  --dark: #1A1A2E;
  --dark2: #16213E;
  --card: #ffffff;
  --bg: #F8F5F0;
  --text: #1A1A2E;
  --muted: #888888;
  --border: #EEEEEE;
}

html, body {
  height: 100%;
  font-family: 'Nunito', sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
}

.app {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
  max-width: 480px;
  margin: 0 auto;
  background: #fff;
  position: relative;
  box-shadow: 0 0 40px rgba(0,0,0,0.1);
}


/* ===== PROMO ADMIN STYLES ===== */

/* --- Header bar --- */
.promo-section-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}
.promo-active-count {
  font-size: 12px; font-weight: 700; color: var(--muted);
  background: var(--bg); border: 1.5px solid var(--border);
  padding: 4px 10px; border-radius: 20px;
}
.promo-active-count.has-promo { color: var(--red); border-color: rgba(232,52,26,0.3); background: rgba(232,52,26,0.06); }

/* --- Add promo button --- */
.add-promo-btn {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 14px 16px;
  background: linear-gradient(135deg,var(--red) 0%,var(--red2) 100%);
  color: #fff; border: none; border-radius: 14px;
  font-family: 'Nunito', sans-serif; font-weight: 800; font-size: 15px;
  cursor: pointer; margin-bottom: 20px;
  transition: transform 0.15s, box-shadow 0.15s;
  justify-content: center;
}
.add-promo-btn:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(232,52,26,0.35); }

/* --- Active promo card --- */
.promo-active-card {
  background: #fff;
  border: 1.5px solid rgba(232,52,26,0.25);
  border-left: 4px solid var(--red2);
  border-radius: 14px;
  padding: 12px 14px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 12px;
  transition: box-shadow 0.2s;
}
.promo-active-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.09); }
.pac-thumb {
  width: 52px; height: 52px; border-radius: 10px;
  object-fit: cover; border: 1px solid var(--border); flex-shrink: 0;
}
.pac-info { flex: 1; min-width: 0; }
.pac-name { font-weight: 800; font-size: 14px; color: var(--text); margin-bottom: 2px;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.pac-cat  { font-size: 11px; color: var(--muted); margin-bottom: 4px; }
.pac-price-row { display: flex; align-items: center; gap: 6px; }
.pac-disc-badge { background: var(--red); color: #fff; font-size: 10px; font-weight: 800; padding: 2px 7px; border-radius: 20px; }
.pac-price-new  { font-weight: 800; font-size: 14px; color: var(--red); }
.pac-price-old  { font-size: 11px; color: var(--muted); text-decoration: line-through; }
.pac-time { font-size: 10px; color: var(--muted); margin-top: 3px; font-weight: 700; }
.pac-actions { display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; }
.pac-edit-btn, .pac-del-btn {
  width: 34px; height: 34px; border-radius: 10px; border: none;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s;
}
.pac-edit-btn { background: rgba(26,26,46,0.08); color: var(--dark); }
.pac-del-btn  { background: rgba(232,52,26,0.1); color: var(--red); }
.pac-edit-btn:hover { background: var(--dark); color: #fff; transform: scale(1.1); }
.pac-del-btn:hover  { background: var(--red); color: #fff; transform: scale(1.1); }

/* --- Promo sheet (select menu + fill form) --- */
.promo-sheet-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 300; display: none; }
.promo-sheet-overlay.open { display: block; }

.promo-bottom-sheet {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%) translateY(100%);
  width: 100%; max-width: 480px; background: #fff;
  border-radius: 24px 24px 0 0;
  z-index: 301;
  transition: transform 0.35s cubic-bezier(0.34,1.2,0.64,1);
  max-height: 92vh; display: flex; flex-direction: column;
}
.promo-bottom-sheet.open { transform: translateX(-50%) translateY(0); }

.promo-sheet-handle {
  width: 40px; height: 4px; border-radius: 2px;
  background: var(--border); margin: 12px auto 0; flex-shrink: 0;
}
.promo-sheet-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 16px 20px 12px; border-bottom: 1.5px solid var(--border); flex-shrink: 0;
}
.promo-sheet-header h3 { font-size: 17px; font-weight: 900; color: var(--text); }
.promo-sheet-body { overflow-y: auto; padding: 16px 20px 32px; flex: 1; }

/* Step indicators */
.promo-steps { display: flex; align-items: center; gap: 4px; margin-bottom: 16px; }
.promo-step {
  display: flex; align-items: center; justify-content: center;
  width: 28px; height: 28px; border-radius: 50%;
  font-size: 12px; font-weight: 800;
  background: var(--bg); color: var(--muted); border: 2px solid var(--border);
  flex-shrink: 0; transition: all 0.2s;
}
.promo-step.active { background: var(--red2); color: #fff; border-color: var(--red2); }
.promo-step.done   { background: var(--green); color: #fff; border-color: var(--green); }
.promo-step-line   { flex: 1; height: 2px; background: var(--border); border-radius: 1px; }
.promo-step-line.done { background: var(--green); }

/* Menu picker list */
.menu-picker-item {
  display: flex; align-items: center; gap: 12px;
  padding: 10px 12px; border-radius: 12px;
  cursor: pointer; transition: background 0.15s; margin-bottom: 6px;
  border: 2px solid transparent;
}
.menu-picker-item:hover { background: var(--bg); }
.menu-picker-item.selected { background: rgba(232,52,26,0.06); border-color: rgba(232,52,26,0.3); }
.mpi-thumb { width: 44px; height: 44px; border-radius: 9px; object-fit: cover; flex-shrink: 0; }
.mpi-name  { font-weight: 800; font-size: 13px; color: var(--text); margin-bottom: 2px; }
.mpi-cat   { font-size: 11px; color: var(--muted); }
.mpi-price { font-size: 12px; font-weight: 800; color: var(--red); }
.mpi-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border);
  flex-shrink: 0; margin-left: auto; display: flex; align-items: center; justify-content: center;
  background: #fff; transition: all 0.2s; }
.menu-picker-item.selected .mpi-check { background: var(--red2); border-color: var(--red2); }

/* Search inside picker */
.picker-search {
  width: 100%; padding: 11px 14px; margin-bottom: 12px;
  border: 2px solid var(--border); border-radius: 12px;
  font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700;
  outline: none; background: var(--bg); color: var(--text);
  transition: border-color 0.2s;
}
.picker-search:focus { border-color: var(--red2); background: #fff; }

/* Form fields inside sheet */
.ps-field { margin-bottom: 14px; }
.ps-label { display: block; font-size: 13px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
.ps-label span { color: var(--red); }
.ps-input {
  width: 100%; padding: 12px 14px;
  border: 2px solid var(--border); border-radius: 12px;
  font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700;
  color: var(--text); outline: none; background: var(--bg);
  transition: border-color 0.2s;
}
.ps-input:focus { border-color: var(--red2); background: #fff; }
.ps-input[readonly] { background: #f5f5f5; color: var(--red); }
.ps-row { display: flex; gap: 10px; }
.ps-row .ps-field { flex: 1; }

.ps-selected-preview {
  display: flex; align-items: center; gap: 10px;
  background: rgba(232,52,26,0.06); border: 1.5px solid rgba(232,52,26,0.25);
  border-radius: 12px; padding: 10px 14px; margin-bottom: 16px;
}
.ps-preview-img { width: 40px; height: 40px; border-radius: 9px; object-fit: cover; }
.ps-preview-name { font-weight: 800; font-size: 13px; }
.ps-preview-price { font-size: 12px; color: var(--muted); margin-top: 1px; }
.ps-change-btn { margin-left: auto; font-size: 12px; font-weight: 800; color: var(--red2);
  background: none; border: none; cursor: pointer; padding: 4px 8px; }

.ps-result-box {
  background: rgba(232,52,26,0.06); border-radius: 12px;
  padding: 12px 14px; margin-top: 12px; margin-bottom: 4px;
}
.ps-result-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 4px; }
.ps-result-price { font-size: 22px; font-weight: 900; color: var(--red); }
.ps-result-save  { font-size: 12px; color: var(--green); font-weight: 700; margin-top: 2px; }

.ps-nav-row { display: flex; gap: 10px; margin-top: 8px; }
.ps-next-btn {
  flex: 1; padding: 14px;
  background: linear-gradient(135deg,var(--red),var(--red2));
  color: #fff; border: none; border-radius: 12px;
  font-family: 'Nunito',sans-serif; font-weight: 800; font-size: 15px;
  cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
}
.ps-next-btn:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(232,52,26,0.3); }
.ps-next-btn:disabled { opacity: 0.45; cursor: not-allowed; transform: none; box-shadow: none; }
.ps-back-btn {
  padding: 14px 20px;
  background: var(--bg); color: var(--text);
  border: 1.5px solid var(--border); border-radius: 12px;
  font-family: 'Nunito',sans-serif; font-weight: 800; font-size: 15px;
  cursor: pointer;
}

.promo-tab-badge {
  display: inline-flex; align-items: center; justify-content: center;
  background: var(--red); color: #fff; border-radius: 50%;
  width: 16px; height: 16px; font-size: 10px; font-weight: 800;
  margin-left: 4px; vertical-align: middle;
}

/* Empty state */
.promo-empty {
  text-align: center; padding: 40px 20px; color: var(--muted);
}
.promo-empty svg { opacity: 0.25; margin-bottom: 12px; }
.promo-empty p { font-size: 14px; font-weight: 700; }

/* ===== LOGIN SCREEN ===== */
.login-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 32px 24px;
  background: linear-gradient(160deg, var(--dark) 0%, var(--dark2) 60%, #0f3460 100%);
}

.login-logo {
  font-family: 'Fredoka One', cursive;
  font-size: 36px;
  color: #fff;
  margin-bottom: 4px;
  letter-spacing: 1px;
}
.login-logo span { color: var(--red2); }

.login-tagline {
  color: rgba(255,255,255,0.5);
  font-size: 13px;
  margin-bottom: 40px;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
}

.login-card {
  background: #fff;
  border-radius: 24px;
  padding: 32px 28px 28px;
  width: 100%;
  max-width: 360px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

.login-icon {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  color: #FFC107;
}

.login-title {
  font-family: 'Fredoka One', cursive;
  font-size: 24px;
  text-align: center;
  color: var(--text);
  margin-bottom: 6px;
}
.login-sub {
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 24px;
  line-height: 1.5;
}

/* Form Input Admin Baru */
.login-form-group {
  margin-bottom: 16px;
  text-align: left;
}

.login-label {
  display: block;
  font-size: 13px;
  font-weight: 800;
  margin-bottom: 6px;
  color: var(--text);
}

.login-input {
  width: 100%;
  padding: 14px;
  border: 2px solid var(--border);
  border-radius: 12px;
  font-family: 'Nunito', sans-serif;
  font-size: 14px;
  font-weight: 700;
  color: var(--text);
  outline: none;
  transition: border-color 0.2s, background 0.2s;
  background: var(--bg);
}

.login-input:focus {
  border-color: var(--dark);
  background: #fff;
}

.login-input.error {
  border-color: var(--red);
  background: #fff8f8;
  animation: shake 0.35s ease;
}

@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

.login-err {
  text-align: center;
  color: var(--red);
  font-size: 13px;
  font-weight: 700;
  min-height: 20px;
  margin-bottom: 16px;
}

.login-btn {
  width: 100%;
  padding: 15px;
  background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
  color: #fff;
  border: none;
  border-radius: 14px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 16px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  letter-spacing: 0.3px;
}
.login-btn:hover {
  transform: scale(1.02);
  box-shadow: 0 6px 20px rgba(26,26,46,0.4);
}

.back-link {
  margin-top: 16px;
  text-align: center;
}
.back-link a {
  color: rgba(255,255,255,0.6);
  font-size: 13px;
  font-weight: 700;
  text-decoration: none;
  transition: color 0.2s;
}
.back-link a:hover { color: #fff; }

/* ===== ADMIN DASHBOARD ===== */
.admin-screen { display: none; flex-direction: column; min-height: 100vh; }
.admin-screen.show { display: flex; }

.admin-header {
  background: linear-gradient(135deg, var(--dark) 0%, var(--dark2) 100%);
  padding: 18px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  position: sticky;
  top: 0;
  z-index: 100;
}
.admin-header-left { display: flex; align-items: center; gap: 10px; }

.logo {
  font-family: 'Fredoka One', cursive;
  font-size: 24px;
  color: #fff;
  letter-spacing: 1px;
}
.logo span { color: var(--red2); }

.admin-badge {
  background: #FFC107;
  color: var(--dark);
  font-size: 10px;
  font-weight: 800;
  padding: 3px 9px;
  border-radius: 20px;
  letter-spacing: 0.5px;
  text-transform: uppercase;
}

.logout-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 50px;
  padding: 8px 14px;
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all 0.2s;
}
.logout-btn:hover { background: rgba(232,52,26,0.3); border-color: var(--red2); }

/* ===== TABS ===== */
.admin-tabs {
  display: flex;
  background: #fff;
  border-bottom: 2px solid var(--border);
  position: sticky;
  top: 62px;
  z-index: 99;
}
.admin-tab-btn {
  flex: 1;
  padding: 12px 6px 10px;
  border: none;
  background: none;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 12px;
  color: var(--muted);
  cursor: pointer;
  transition: all 0.2s;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 4px;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
}
.admin-tab-btn.active { color: var(--dark); border-bottom-color: var(--red2); }

/* ===== CONTENT AREA ===== */
.admin-content {
  flex: 1;
  padding: 16px;
  padding-bottom: 32px;
  overflow-y: auto;
}
.hidden { display: none !important; }

/* Section title */
.section-title {
  font-size: 16px;
  font-weight: 800;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 8px;
  color: var(--text);
}
.section-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--red2);
  flex-shrink: 0;
  display: inline-block;
}

/* ===== FILTER BUTTONS ===== */
.filter-row {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.filter-row::-webkit-scrollbar { display: none; }
.filter-btn {
  flex: none;
  padding: 7px 14px;
  border-radius: 50px;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
  border: 1.5px solid var(--border);
  background: var(--bg);
  color: var(--text);
  transition: all 0.2s;
  white-space: nowrap;
}
.filter-btn:hover { background: var(--border); }
.filter-btn.active { background: var(--red2); color: #fff; border-color: var(--red2); }
.filter-btn.active-orange { background: var(--orange); color: #fff; border-color: var(--orange); }
.filter-btn.active-green { background: var(--green); color: #fff; border-color: var(--green); }

/* ===== ACTION BUTTONS ===== */
.action-btn-small {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 50px;
  padding: 7px 14px;
  color: #fff;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all 0.2s;
}

.btn-red {
  background: linear-gradient(135deg, var(--red) 0%, var(--red2) 100%);
  color: #fff;
  border: none;
  border-radius: 14px;
  padding: 14px 16px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 15px;
  cursor: pointer;
  transition: transform 0.2s, box-shadow 0.2s;
  width: 100%;
}
.btn-red:hover { transform: scale(1.02); box-shadow: 0 6px 20px rgba(232,52,26,0.4); }

.btn-red-sm {
  background: linear-gradient(135deg, var(--red) 0%, var(--red2) 100%);
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 8px 14px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 12px;
  cursor: pointer;
  transition: transform 0.2s;
  display: flex;
  align-items: center;
  gap: 4px;
}
.btn-red-sm:hover { transform: scale(1.04); }

.btn-outline {
  background: #fff;
  color: var(--text);
  border: 2px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  font-family: 'Nunito', sans-serif;
  font-weight: 800;
  font-size: 15px;
  cursor: pointer;
  transition: all 0.2s;
  width: 100%;
}
.btn-outline:hover { background: var(--bg); }

/* ===== REFRESH BTN ===== */
.refresh-btn {
  background: var(--red2);
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 7px 14px;
  font-family: 'Nunito', sans-serif;
  font-weight: 700;
  font-size: 12px;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 5px;
  transition: all 0.2s;
}
.refresh-btn:hover { transform: scale(1.04); }

/* ===== EMPTY STATE ===== */
.empty-state {
  text-align: center;
  padding: 40px 20px;
  color: var(--muted);
}
.empty-state svg { color: #ddd; margin-bottom: 12px; }
.empty-state p { font-size: 14px; line-height: 1.6; }

/* ===== ORDER CARDS ===== */
.order-card {
  background: #fff;
  border: 1.5px solid var(--border);
  border-radius: 16px;
  margin-bottom: 10px;
  overflow: hidden;
  transition: box-shadow 0.2s, transform 0.2s;
}
.order-card:hover { box-shadow: 0 4px 16px rgba(0,0,0,0.09); transform: translateY(-1px); }

.order-card-head {
  padding: 12px 14px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 1px dashed var(--border);
}
.order-id { font-weight: 800; font-size: 14px; color: var(--text); }
.order-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }

.status-badge {
  padding: 5px 10px;
  border-radius: 50px;
  color: #fff;
  font-size: 10px;
  font-weight: 800;
  text-transform: uppercase;
  display: inline-flex;
  align-items: center;
  gap: 4px;
  white-space: nowrap;
  flex-shrink: 0;
}

.order-card-body { padding: 10px 14px 12px; }
.order-items-text { font-size: 12px; color: var(--muted); margin-bottom: 10px; line-height: 1.5; }
.order-total { font-weight: 800; font-size: 16px; color: var(--text); margin-bottom: 10px; }

.order-action-row { display: flex; gap: 6px; }
.status-change-btn {
  flex: 1;
  padding: 8px 4px;
  border-radius: 10px;

// ===== STATE =====
let orderFilter = 'semua';
let menuFilter = 'semua';
let editingId = null;
let deleteTargetId = null;
let idCounter = 200;
let toastTimer = null;

// ===== HELPERS =====
function fmt(n) { return 'Rp ' + n.toLocaleString('id-ID'); }
function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }
function getOrders() { return JSON.parse(localStorage.getItem('makanYuk_orders')) || []; }
function saveOrders(orders) { localStorage.setItem('makanYuk_orders', JSON.stringify(orders)); }

function findMenu(id) {
  for (const t of ['makanan','minuman','camilan','paketan']) {
    const m = menus[t].find(x => x.id === id);
    if (m) return m;
  }
  return null;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ===== LOGIN =====
function checkCredentials() {
  const userIdInput = document.getElementById('adminUserId');
  const passInput = document.getElementById('adminPassword');
  
  const userId = userIdInput.value.trim();
  const pass = passInput.value;

  if (userId === ADMIN_USER_ID && pass === ADMIN_PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminScreen').classList.add('show');
    switchTab('pesanan');
    showToast('Berhasil Masuk!');
    
    // Clear inputs after successful login
    userIdInput.value = '';
    passInput.value = '';
  } else {
    document.getElementById('loginErr').textContent = 'ID Pengguna atau Password salah!';
    userIdInput.classList.add('error');
    passInput.classList.add('error');
    
    setTimeout(() => {
      userIdInput.classList.remove('error');
      passInput.classList.remove('error');
      document.getElementById('loginErr').textContent = '';
    }, 1000);
  }
}

function doLogout() {
  // Mengembalikan layar ke menu login
  document.getElementById('adminScreen').classList.remove('show');
  document.getElementById('loginScreen').style.display = 'flex';
  showToast('Berhasil keluar!');
}

// ===== TABS =====
function switchTab(tab) {
  ['pesanan','menu','ringkasan','promo'].forEach(t => {
    document.getElementById('view' + cap(t)).classList.add('hidden');
    document.getElementById('tabBtn' + cap(t)).classList.remove('active');
  });
  document.getElementById('view' + cap(tab)).classList.remove('hidden');
  document.getElementById('tabBtn' + cap(tab)).classList.add('active');
  if (tab === 'pesanan') renderOrders();
  if (tab === 'menu') renderMenuList();
  if (tab === 'ringkasan') renderRingkasan();
  if (tab === 'promo') renderPromoAdmin();
}

// ===== ORDERS TAB =====
function setOrderFilter(f, el) {
  orderFilter = f;
  document.querySelectorAll('#orderFilterRow .filter-btn').forEach(b => b.classList.remove('active','active-orange','active-green'));
  if (f === 'semua') el.classList.add('active');
  else if (f === 'belum bayar') el.classList.add('active');
  else if (f === 'disiapkan') el.classList.add('active-orange');
  else if (f === 'selesai') el.classList.add('active-green');
  renderOrders();
}

function renderOrders() {
  let orders = getOrders();
  if (orderFilter !== 'semua') orders = orders.filter(o => o.status === orderFilter);
  const el = document.getElementById('orderList');

  if (!orders.length) {
    el.innerHTML = `<div class="empty-state"><svg xmlns="http://www.w3.org/2000/svg" height="56" viewBox="0 -960 960 960" width="56" fill="currentColor"><path d="M280-80q-33 0-56.5-23.5T200-160q0-33 23.5-56.5T280-240q33 0 56.5 23.5T360-160q0 33-23.5 56.5T280-80Zm400 0q-33 0-56.5-23.5T600-160q0-33 23.5-56.5T680-240q33 0 56.5 23.5T760-160q0 33-23.5 56.5T680-80ZM246-720l96 200h280l110-200H246Zm-38-80h590q23 0 35 20.5t1 41.5L692-482q-11 20-29.5 31T622-440H324l-44 80h480v80H280q-45 0-68-39.5t-2-78.5l54-98-144-304H40v-80h130l38 80Zm134 280h280-280Z"/></svg><p>Belum ada pesanan.</p></div>`;
    return;
  }

  el.innerHTML = orders.map(o => {
    let badgeColor = 'var(--red)'; let badgeLabel = 'BELUM BAYAR';
    if (o.status === 'disiapkan') { badgeColor = 'var(--orange)'; badgeLabel = 'DISIAPKAN'; }
    if (o.status === 'selesai') { badgeColor = 'var(--green)'; badgeLabel = 'SELESAI'; }
    const preview = o.items.map(i => `${i.name} ×${i.qty}`).join(' • ');
    const methodLabel = o.method === 'dine_in' ? 'Makan di Tempat' : 'Ambil Kasir';
    const customer = o.customerName ? ` • Customer ${o.customerName}` : '';
    return `
    <div class="order-card">
      <div class="order-card-head">
        <div>
          <div class="order-id">${o.orderId}</div>
          <div class="order-meta">${o.timestamp} • ${methodLabel}${customer}</div>
        </div>
        <span class="status-badge" style="background:${badgeColor};">${badgeLabel}</span>
      </div>
      <div class="order-card-body">
        <div class="order-items-text">${preview}</div>
        <div class="order-total">${fmt(o.totalHarga)}</div>
        <div class="order-action-row">
          <button class="status-change-btn ${o.status==='belum bayar'?'s-unpaid':''}" onclick="setOrderStatus('${o.orderId}','belum bayar')">Belum Bayar</button>
          <button class="status-change-btn ${o.status==='disiapkan'?'s-preparing':''}" onclick="setOrderStatus('${o.orderId}','disiapkan')">Disiapkan</button>
          <button class="status-change-btn ${o.status==='selesai'?'s-done':''}" onclick="setOrderStatus('${o.orderId}','selesai')">Selesai</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function setOrderStatus(orderId, status) {
  const orders = getOrders();
  const idx = orders.findIndex(o => o.orderId === orderId);
  if (idx !== -1) {
    orders[idx].status = status;
    saveOrders(orders);
    showToast(`Status → ${status}`);
    renderOrders();
  }
}

function openEditMenu(id) {
  const m = findMenu(id);
  if (!m) return;
  editingId = id;
  document.getElementById('sheetTitle').textContent = 'Edit Menu';
  document.getElementById('editId').value = id;
  document.getElementById('fName').value = m.name;
  document.getElementById('fDesc').value = m.desc;
  document.getElementById('fPrice').value = m.price;
  document.getElementById('fType').value = m.type;
  document.getElementById('fBadge').value = m.badge || '';

function openSheet() {
  document.getElementById('sheetOverlay').classList.add('open');
  document.getElementById('menuSheet').classList.add('open');
}
function closeSheet() {
  document.getElementById('sheetOverlay').classList.remove('open');
  document.getElementById('menuSheet').classList.remove('open');
}

function saveMenu() {
  const name = document.getElementById('fName').value.trim();
  const desc = document.getElementById('fDesc').value.trim();
  const price = parseInt(document.getElementById('fPrice').value);
  const type = document.getElementById('fType').value;
  const badge = document.getElementById('fBadge').value;

  if (!name || !price || !type) { showToast('Nama dan harga wajib diisi!'); return; }

  const defaultImgs = { makanan:'images/makanan-1.png', minuman:'images/minuman-1.png', camilan:'images/camilan-1.png', paketan:'images/paketan-1.png' };

  if (editingId) {
    let found = false;
    for (const t of ['makanan','minuman','camilan','paketan']) {
      const idx = menus[t].findIndex(m => m.id === editingId);
      if (idx !== -1) {
        const oldImg = menus[t][idx].img;
        const updated = { id: editingId, name, desc, price, img: oldImg, badge, type };
        menus[t].splice(idx, 1);
        menus[type].push(updated);
        found = true;
        break;
      }
    }
    if (found) showToast('Menu berhasil diperbarui!');
  } else {
    const newId = 'cx_' + (++idCounter);
    menus[type].push({ id: newId, name, desc, price, img: defaultImgs[type], badge, type });
    showToast('Menu baru ditambahkan!');
  }

  closeSheet();
  renderMenuList();
}

function confirmDelete(id) {
  const m = findMenu(id);
  if (!m) return;
  deleteTargetId = id;
  document.getElementById('confirmText').textContent = `Hapus menu "${m.name}"?`;
  document.getElementById('confirmOverlay').classList.add('open');
  document.getElementById('confirmBox').classList.add('show');
}

function closeConfirm(yes) {
  document.getElementById('confirmOverlay').classList.remove('open');
  document.getElementById('confirmBox').classList.remove('show');
  if (yes && deleteTargetId) {
    for (const t of ['makanan','minuman','camilan','paketan']) {
      const idx = menus[t].findIndex(m => m.id === deleteTargetId);
      if (idx !== -1) {
        const name = menus[t][idx].name;
        menus[t].splice(idx, 1);
        showToast(`"${name}" dihapus`);
        renderMenuList();
        break;
      }
    }
  }
  deleteTargetId = null;
}

// ===== RINGKASAN TAB =====
function renderRingkasan() {
  const orders = getOrders();
  const paid = orders.filter(o => o.status !== 'belum bayar');
  const totalRev = paid.reduce((s, o) => s + o.totalHarga, 0);
  const selesai = orders.filter(o => o.status === 'selesai').length;
  const disiapkan = orders.filter(o => o.status === 'disiapkan').length;
  const belumBayar = orders.filter(o => o.status === 'belum bayar').length;

  document.getElementById('revenueCard').innerHTML = `
    <div class="revenue-card">
      <div class="revenue-label">Total Pendapatan</div>
      <div class="revenue-amount">${fmt(totalRev)}</div>
      <div class="revenue-sub">dari ${paid.length} pesanan terbayar</div>
    </div>`;

  document.getElementById('statsGrid').innerHTML = `
    <div class="stat-card"><div class="stat-num">${orders.length}</div><div class="stat-label">Total Pesanan</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--green)">${selesai}</div><div class="stat-label">Selesai</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--orange)">${disiapkan}</div><div class="stat-label">Disiapkan</div></div>
    <div class="stat-card"><div class="stat-num" style="color:var(--red)">${belumBayar}</div><div class="stat-label">Belum Bayar</div></div>`;

  // Popular items
  const counts = {};
  orders.forEach(o => o.items.forEach(item => {
    if (!counts[item.id]) counts[item.id] = { name: item.name, qty: 0, rev: 0, img: item.img };
    counts[item.id].qty += item.qty;
    counts[item.id].rev += item.price * item.qty;
  }));
  const sorted = Object.values(counts).sort((a,b) => b.qty - a.qty).slice(0,5);

  const popEl = document.getElementById('popularList');
  if (!sorted.length) {
    popEl.innerHTML = `<div class="empty-state" style="padding:20px;"><p>Belum ada data penjualan.</p></div>`;
    return;
  }
  popEl.innerHTML = sorted.map((item, i) => `
    <div class="popular-item">
      <div class="popular-rank ${i < 3 ? 'top' : ''}">${i+1}</div>
      <img class="popular-img" src="${item.img}" alt="${item.name}" onerror="this.src='images/makanan-1.png'">
      <div class="popular-info">
        <div class="popular-name">${item.name}</div>
        <div class="popular-qty">${item.qty} terjual</div>
      </div>
      <div class="popular-rev">${fmt(item.rev)}</div>
    </div>`).join('');
}

  if (active.length === 0) {

function deletePromoItem(id) {
  const m = findMenu(id); if (!m) return;
  deleteTargetId = id;
  document.getElementById('confirmText').textContent = `Hapus promo untuk "${m.name}"?`;
  document.getElementById('confirmOverlay').classList.add('open');
  document.getElementById('confirmBox').classList.add('show');
  // Override confirm action for promo delete
  window._confirmPromoDelete = true;
}

// Override closeConfirm to handle promo delete too
const _origCloseConfirm = window.closeConfirm;
window.closeConfirm = function(yes) {
  document.getElementById('confirmOverlay').classList.remove('open');
  document.getElementById('confirmBox').classList.remove('show');
  if (yes && deleteTargetId) {
    if (window._confirmPromoDelete) {
      const promos = getPromos();
      delete promos[deleteTargetId];
      savePromos(promos);
      showToast('Promo dihapus!');
      renderPromoAdmin();
    } else {
      // original menu delete
      for (const t of ['makanan','minuman','camilan','paketan']) {
        const idx = menus[t].findIndex(m => m.id === deleteTargetId);
        if (idx !== -1) {
          const name = menus[t][idx].name;
          menus[t].splice(idx, 1);
          showToast(`"${name}" dihapus`);
          renderMenuList();
          break;
        }
      }
    }
  }
  deleteTargetId = null;
  window._confirmPromoDelete = false;
};

function closePromoSheet() {
  document.getElementById('promoSheetOverlay').classList.remove('open');
  document.getElementById('promoBottomSheet').classList.remove('open');
}

function renderPromoSheetStep() {
  const body = document.getElementById('promoSheetBody');
  if (promoSheetStep === 1) renderPickerStep(body);
  else renderFormStep(body);
}

// ── Step 1: Pick menu ──────────────────────────────────────────────────────
function renderPickerStep(body) {
  const promos = getPromos();
  const alreadyPromo = new Set(Object.keys(promos).filter(k => promos[k].active));

  body.innerHTML = `
    <div class="promo-steps">
      <div class="promo-step active">1</div>
      <div class="promo-step-line"></div>
      <div class="promo-step">2</div>
    </div>
    <p style="font-size:13px;color:var(--muted);font-weight:700;margin-bottom:12px;">Pilih menu yang ingin diberi promo diskon:</p>
    <input type="text" class="picker-search" id="pickerSearch" placeholder="🔍 Cari nama menu..." oninput="filterPickerList(this.value)">
    <div id="pickerList"></div>
    <div class="ps-nav-row" style="margin-top:16px;">
      <button class="ps-back-btn" onclick="closePromoSheet()">Batal</button>
      <button class="ps-next-btn" id="pickerNextBtn" onclick="goToFormStep()" disabled>Lanjut →</button>
    </div>`;

  renderPickerList('', alreadyPromo);
}

function renderPickerList(q, alreadyPromo) {
  const all = getAllMenuItems();
  const filtered = q ? all.filter(m => m.name.toLowerCase().includes(q.toLowerCase())) : all;
  const list = document.getElementById('pickerList');
  if (!list) return;

  const catLabels = {makanan:'Makanan',minuman:'Minuman',camilan:'Camilan',paketan:'Paketan'};
  list.innerHTML = filtered.map(m => {
    const sel = promoSheetSelectedId === m.id;
    const hasPromo = alreadyPromo && alreadyPromo.has(m.id);
    return `
    <div class="menu-picker-item ${sel ? 'selected' : ''}" id="mpi_${m.id}" onclick="selectPickerMenu('${m.id}')">
      <img class="mpi-thumb" src="${m.img}" alt="${m.name}" onerror="this.src='images/makanan-1.png'">
      <div style="flex:1;min-width:0;">
        <div class="mpi-name">${m.name} ${hasPromo ? '<span style="font-size:10px;background:var(--orange);color:#fff;padding:1px 6px;border-radius:10px;font-weight:800;margin-left:4px;">Promo</span>' : ''}</div>
        <div class="mpi-cat">${catLabels[m.type]}</div>
        <div class="mpi-price">${fmtLocal(m.price)}</div>
      </div>
      <div class="mpi-check">
        ${sel ? '<svg xmlns="http://www.w3.org/2000/svg" height="12" viewBox="0 -960 960 960" width="12" fill="#fff"><path d="M382-240 154-468l57-57 171 171 367-367 57 57-424 424Z"/></svg>' : ''}
      </div>
    </div>`;
  }).join('');
}

function filterPickerList(q) {
  const promos = getPromos();
  const alreadyPromo = new Set(Object.keys(promos).filter(k => promos[k].active));
  renderPickerList(q, alreadyPromo);
}

function selectPickerMenu(id) {
  promoSheetSelectedId = id;
  const promos = getPromos();
  const alreadyPromo = new Set(Object.keys(promos).filter(k => promos[k].active));
  const q = document.getElementById('pickerSearch') ? document.getElementById('pickerSearch').value : '';
  renderPickerList(q, alreadyPromo);
  const btn = document.getElementById('pickerNextBtn');
  if (btn) btn.disabled = false;
}

function goToFormStep() {
  if (!promoSheetSelectedId) return;
  promoSheetStep = 2;
  renderPromoSheetStep();
}

// ── Step 2: Fill promo form ────────────────────────────────────────────────
function renderFormStep(body) {
  const m = findMenu(promoSheetSelectedId); if (!m) return;
  const promos = getPromos();
  const existing = promos[m.id] || {};
  const disc = existing.discount || '';
  const prevPrice = disc ? fmtLocal(Math.round(m.price * (1 - disc/100))) : '';

  const isEdit = !!promoSheetEditId;

  body.innerHTML = `
    <div class="promo-steps">
      <div class="promo-step done">✓</div>
      <div class="promo-step-line done"></div>
      <div class="promo-step active">2</div>
    </div>

    <div class="ps-selected-preview">
      <img class="ps-preview-img" src="${m.img}" alt="${m.name}" onerror="this.src='images/makanan-1.png'">
      <div>
        <div class="ps-preview-name">${m.name}</div>
        <div class="ps-preview-price">Harga normal: ${fmtLocal(m.price)}</div>
      </div>
      ${!isEdit ? '<button class="ps-change-btn" onclick="backToPickerStep()">← Ganti</button>' : ''}
    </div>

    <div class="ps-field">
      <label class="ps-label">Besaran Diskon <span>*</span></label>
      <input type="number" class="ps-input" id="psDisc" min="1" max="99"
        placeholder="Contoh: 20 (artinya 20%)" value="${disc}"
        oninput="livePreviewPromo(${m.price})">
    </div>

    <div id="psResultBox" style="${disc ? '' : 'display:none;'}">
      <div class="ps-result-box">
        <div class="ps-result-label">Harga setelah diskon</div>
        <div class="ps-result-price" id="psResultPrice">${prevPrice}</div>
        <div class="ps-result-save" id="psResultSave">${disc ? 'Hemat '+fmtLocal(m.price - Math.round(m.price*(1-disc/100))) : ''}</div>
      </div>
    </div>

    <div class="ps-row">
      <div class="ps-field">
        <label class="ps-label">Tanggal Mulai</label>
        <input type="date" class="ps-input" id="psStartDate" value="${existing.startDate||''}">
      </div>
      <div class="ps-field">
        <label class="ps-label">Tanggal Selesai</label>
        <input type="date" class="ps-input" id="psEndDate" value="${existing.endDate||''}">
      </div>
    </div>
    <div class="ps-row">
      <div class="ps-field">
        <label class="ps-label">Jam Mulai</label>
        <input type="time" class="ps-input" id="psStartTime" value="${existing.startTime||''}">
      </div>
      <div class="ps-field">
        <label class="ps-label">Jam Selesai</label>
        <input type="time" class="ps-input" id="psEndTime" value="${existing.endTime||''}">
      </div>
    </div>
    <p style="font-size:11px;color:var(--muted);font-weight:600;margin-bottom:16px;">💡 Kosongkan tanggal/jam jika promo berlaku setiap saat.</p>

    <div class="ps-nav-row">
      ${!isEdit ? '<button class="ps-back-btn" onclick="backToPickerStep()">← Kembali</button>' : '<button class="ps-back-btn" onclick="closePromoSheet()">Batal</button>'}
      <button class="ps-next-btn" onclick="savePromoFromSheet(${m.price})">💾 Simpan Promo</button>
    </div>`;
}

function backToPickerStep() {
  promoSheetStep = 1;
  renderPromoSheetStep();
}

function livePreviewPromo(basePrice) {
  const disc = parseInt(document.getElementById('psDisc').value) || 0;
  const box = document.getElementById('psResultBox');
  const priceEl = document.getElementById('psResultPrice');
  const saveEl = document.getElementById('psResultSave');
  if (disc > 0 && disc < 100) {
    const after = Math.round(basePrice * (1 - disc/100));
    const saved = basePrice - after;
    if (box) box.style.display = '';
    if (priceEl) priceEl.textContent = fmtLocal(after);
    if (saveEl)  saveEl.textContent  = 'Hemat ' + fmtLocal(saved);
  } else {
    if (box) box.style.display = 'none';
  }
}

function savePromoFromSheet(basePrice) {
  const disc = parseInt(document.getElementById('psDisc').value) || 0;
  if (disc <= 0 || disc >= 100) { showToast('Masukkan diskon antara 1–99%!'); return; }
  const promos = getPromos();
  promos[promoSheetSelectedId] = {
    active: true,
    discount:   disc,
    startDate:  document.getElementById('psStartDate').value,
    endDate:    document.getElementById('psEndDate').value,
    startTime:  document.getElementById('psStartTime').value,
    endTime:    document.getElementById('psEndTime').value,
  };
  savePromos(promos);
  closePromoSheet();
  showToast('🎉 Promo berhasil disimpan!');
  renderPromoAdmin();
}

</script>
</body>
</html>
